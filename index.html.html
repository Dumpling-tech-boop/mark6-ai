
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>六合彩激进型唯一推荐V1</title>
<style>
body { font-family: -apple-system; padding: 16px; background:#f5f5f5; }
.card { background:white; padding:16px; border-radius:12px; margin-top:12px; }
button { padding:12px; border:0; border-radius:10px; background:#ff3b30; color:white; font-size:16px; }
textarea { width:100%; height:120px; }
.result { font-size:20px; font-weight:bold; margin-top:10px; }
.small { color:#666; font-size:12px; }
</style>
</head>
<body>

<h2>🏆 六合彩激进型唯一推荐 V1</h2>

<div class="card">
<p>输入历史开奖记录（可选，每行一期开奖结果，用空格分隔号码）：</p>
<textarea id="history"></textarea>
<div class="small">示例：01 05 08 12 24 33</div>
</div>

<div class="card">
<button onclick="generate()">🎯 生成今日唯一推荐</button>

<div class="result" id="result"></div>
<div id="reason" class="small"></div>
</div>

<script>
function parseHistory(text){
    let freq = Array(50).fill(0);
    let lines = text.trim().split("\\n");
    for(let line of lines){
        let nums = line.trim().split(" ");
        nums.forEach(n=>{
            let x = parseInt(n);
            if(x>=1 && x<=49) freq[x]++;
        });
    }
    return freq;
}

function weightedPick(freq){
    let candidates = [];
    for(let i=1;i<=49;i++){
        let weight = 1 + freq[i]*3; // 激进：热号权重大
        for(let j=0;j<weight;j++) candidates.push(i);
    }
    return candidates[Math.floor(Math.random()*candidates.length)];
}

function generate(){
    let freq = parseHistory(document.getElementById("history").value);

    let result = new Set();

    while(result.size < 6){
        result.add(weightedPick(freq));
    }

    let arr = Array.from(result).sort((a,b)=>a-b);

    document.getElementById("result").innerText =
        "推荐号码：" + arr.join(" ");

    document.getElementById("reason").innerText =
        "激进型策略：优先热号权重 + 随机动态生成（非预测，仅统计模型）";
}
</script>

</body>
</html>
