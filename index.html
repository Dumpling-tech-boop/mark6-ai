<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Mark6 AI Pro 1.0</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- 左侧菜单 -->
  <div class="sidebar">
    <h2>🧠 Mark6 AI</h2>

    <button onclick="showPage('dashboard')">📊 仪表盘</button>
    <button onclick="showPage('data')">📂 数据管理</button>
    <button onclick="showPage('analysis')">📈 数据分析</button>
    <button onclick="showPage('ai')">🤖 AI选号</button>
    <button onclick="showPage('settings')">⚙ 设置</button>

  </div>

  <!-- 主区域 -->
  <div class="main">

    <!-- 仪表盘 -->
    <div id="dashboard" class="page active">
      <h1>📊 仪表盘</h1>
      <div class="card">📌 数据状态：未加载</div>
      <div class="card">📌 收录期数：0</div>
      <div class="card">📌 AI模型：未启动</div>
    </div>

    <!-- 数据 -->
    <div id="data" class="page">
      <h1>📂 数据管理</h1>
      <textarea id="input" placeholder="粘贴历史开奖数据..."></textarea>
      <button onclick="saveData()">保存数据</button>
    </div>

    <!-- 分析 -->
    <div id="analysis" class="page">
      <h1>📈 数据分析</h1>
      <div id="analysisBox">暂无数据</div>
    </div>

    <!-- AI -->
    <div id="ai" class="page">
      <h1>🤖 AI选号</h1>
      <button onclick="generate()">生成推荐</button>
      <div id="result"></div>
    </div>

    <!-- 设置 -->
    <div id="settings" class="page">
      <h1>⚙ 设置</h1>
      <p>后续可调权重参数</p>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
