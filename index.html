<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>六合彩智能分析 V10 终极版</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:14px;
  display:inline-block;
  box-shadow:0 3px 12px rgba(0,0,0,0.12);
  max-width:700px;
}

textarea{
  width:100%;
  height:120px;
  margin-top:10px;
}

.nums{
  font-size:22px;
  color:#e91e63;
  margin:15px 0;
  font-weight:bold;
  white-space:pre-line;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#2196F3;
  color:white;
  font-size:14px;
  margin:5px;
}

.tip{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="box">

<h2>🧠 六合彩智能分析 V10 终极版</h2>

<p class="tip">支持数据导入 + AI权重分析 + 7码推荐</p>

<textarea id="input">
03 06 12 18 21 27 33
06 09 12 18 21 27 45
03 06 09 18 21 33 42
05 11 17 23 29 35 41
</textarea>

<br>

<button onclick="analyze()">📊 数据分析</button>
<button onclick="draw()">📈 图表分析</button>
<button onclick="generate()">🎯 AI推荐7码</button>

<div class="nums" id="result">等待分析...</div>

<canvas id="chart" width="600" height="300"></canvas>

</div>

<script>

let freq = Array(50).fill(0);
let weight = Array(50).fill(1);

// 数据分析
function analyze(){
  freq = Array(50).fill(0);

  let lines = document.getElementById("input").value.trim().split("\n");

  lines.forEach(line=>{
    line.split(" ").forEach(n=>{
      let num = parseInt(n);
      if(num>=1 && num<=49){
        freq[num]++;
      }
    });
  });

  // 生成权重
  for(let i=1;i<=49;i++){
    weight[i] = 1 + freq[i]*2;
    if(freq[i]==0) weight[i]+=1.5;
  }

  document.getElementById("result").innerText = "数据分析完成 ✔";
}

// 图表
function draw(){
  let labels=[], data=[];

  for(let i=1;i<=49;i++){
    labels.push(i);
    data.push(freq[i]);
  }

  new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{
        label:'号码出现次数',
        data:data,
        backgroundColor:'#42a5f5'
      }]
    }
  });
}

// 随机函数
function randWeighted(){
  let sum = weight.reduce((a,b)=>a+b,0);
  let r = Math.random()*sum;

  for(let i=1;i<=49;i++){
    r -= weight[i];
    if(r<=0) return i;
  }
  return 1;
}

// 生成7码
function generate(){

  let best=null;
  let bestScore=-1;

  for(let t=0;t<60;t++){

    let set=new Set();

    while(set.size<7){
      set.add(randWeighted());
    }

    let arr=[...set];

    // 评分
    let score=0;
    arr.forEach(n=>{
      score += weight[n];
    });

    if(score>bestScore){
      bestScore=score;
      best=set;
    }
  }

  let arr=[...best];

  document.getElementById("result").innerText =
    "正码：" + arr.slice(0,6).join(" - ") +
    "\n特码：" + arr[6];
}

</script>

</body>
</html>
